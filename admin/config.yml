backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

publish_mode: simple

collections:
  - name: "site"
    label: "Portfolio Content"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "content/portfolio.json"
        fields:
          - { label: "Hero — small kicker text", name: "heroKicker", widget: "string" }
          - { label: "Hero Headline (plain part)", name: "heroHeadlinePlain", widget: "string" }
          - { label: "Hero Headline (emphasized/italic part)", name: "heroHeadlineEmphasis", widget: "string" }
          - { label: "Hero paragraph", name: "heroLede", widget: "text" }
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Discipline", name: "discipline", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Status", name: "status", widget: "string" }
          - label: "Section headings (leave blank to use defaults)"
            name: "sectionTitles"
            widget: "object"
            required: false
            fields:
              - { label: "About heading", name: "about", widget: "string", required: false }
              - { label: "Projects heading", name: "projects", widget: "string", required: false }
              - { label: "Skills heading", name: "skills", widget: "string", required: false }
              - { label: "Contact heading", name: "contact", widget: "string", required: false }
          - label: "About — paragraphs"
            name: "aboutParagraphs"
            widget: "list"
            field: { label: "Paragraph", name: "text", widget: "text" }
          - label: "About — transferable skills"
            name: "transferList"
            widget: "list"
            fields:
              - { label: "From (old skill)", name: "from", widget: "string" }
              - { label: "To (design skill)", name: "to", widget: "string" }
          - label: "Projects"
            name: "caseStudies"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Status", name: "status", widget: "select", options: ["Live prototype", "In progress", "Planned", "Complete"] }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Cover image (card)", name: "cover", widget: "image", required: false, hint: "Screenshot for the homepage card. The card auto-crops to a tall 4:5 shape (e.g. 1200×1500px) — keep the main subject centered. Leave empty for a gradient cover." }
              - { label: "Cover is dark or light?", name: "coverTone", widget: "select", options: ["dark", "light"], default: "dark", hint: "Dark cover shows white text, light cover shows dark text." }
              - { label: "Short description (card + hero fallback)", name: "description", widget: "text" }
              - { label: "Problem (card hover)", name: "problem", widget: "string", required: false }
              - { label: "Process (card hover)", name: "process", widget: "string", required: false }
              - { label: "Outcome (card hover)", name: "outcome", widget: "string", required: false }
              - { label: "Link to live prototype / site", name: "link", widget: "string", required: false }
              - { label: "Tagline (big line on detail page)", name: "tagline", widget: "text", required: false }
              - { label: "Detail page banner image", name: "heroImage", widget: "image", required: false, hint: "Wide background for the top banner of the project page. Recommended: 1920×800px or wider, landscape." }
              - { label: "Banner is dark or light?", name: "heroTone", widget: "select", options: ["dark", "light"], default: "dark", required: false, hint: "Dark banner shows white text, light banner shows dark text. Only applies when a banner image is set." }
              - { label: "Role", name: "role", widget: "string", required: false }
              - { label: "Timeline", name: "timeline", widget: "string", required: false }
              - { label: "Tools", name: "tools", widget: "string", required: false }
              - { label: "Platform", name: "platform", widget: "string", required: false, hint: "e.g. Mobile app + responsive web" }
              - { label: "Concept / the idea", name: "concept", widget: "text", required: false }
              - { label: "Design approach", name: "approach", widget: "text", required: false }
              - label: "Key features"
                name: "features"
                widget: "list"
                required: false
                fields:
                  - { label: "Feature title", name: "title", widget: "string" }
                  - { label: "Feature detail", name: "detail", widget: "string", required: false }
              - label: "Website screenshots (wide)"
                name: "webShots"
                widget: "list"
                required: false
                fields:
                  - { label: "Image", name: "image", widget: "image", hint: "Shown at full width, uncropped. Recommended: 1600px wide or more, landscape." }
                  - { label: "Caption", name: "caption", widget: "string", required: false }
              - label: "Mobile screenshots (tall)"
                name: "mobileShots"
                widget: "list"
                required: false
                fields:
                  - { label: "Image", name: "image", widget: "image", hint: "Shown uncropped. Recommended: a real phone screenshot ratio, e.g. 1290×2653px (portrait)." }
                  - { label: "Caption", name: "caption", widget: "string", required: false }
              - { label: "Outcome & reflection (what you learned, what you'd do next)", name: "reflection", widget: "text", required: false }
          - label: "Skills grid"
            name: "skills"
            widget: "list"
            fields:
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Description", name: "description", widget: "string" }
          - { label: "Contact email", name: "email", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
          - { label: "Resume PDF", name: "resume", widget: "file", required: false }
          - { label: "Xiaohongshu URL", name: "xiaohongshu", widget: "string", required: false }
